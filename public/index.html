<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0D1117" />
  <title>JARVIS 🤖</title>
  <meta name="description" content="Agregador inteligente de noticias estilo Jarvis — Puerto Rico, energia, agua, economia, clima, tecnologia e IA." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@500;700;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/jarvis.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='42' fill='none' stroke='%23D4AF37' stroke-width='6'/><circle cx='50' cy='50' r='20' fill='%23D4AF37'/></svg>" />
</head>
<body>
  <!-- ====================== SPLASH / LOADING ====================== -->
  <div id="splash" class="splash">
    <div class="jarvis-stage">
      <div class="ring ring-outer"></div>
      <div class="ring ring-mid"></div>
      <div class="ring ring-inner"></div>
      <div class="jarvis-core">
        <span class="jarvis-mark">J</span>
      </div>
      <div class="scan"></div>
    </div>
    <h1 class="splash-title glow">JAR<span>VIS</span></h1>
    <p id="splashStatus" class="splash-status">Inicializando sistema de noticias…</p>
    <div class="progress"><div id="splashBar" class="progress-bar"></div></div>
    <p class="splash-version">v1.0.0</p>
  </div>

  <!-- ====================== APP SHELL ====================== -->
  <div id="app" class="app hidden">
    <!-- HEADER -->
    <header class="topbar">
      <div class="brand" data-route="#/home" role="button" tabindex="0">
        <div class="brand-orb"><span>J</span></div>
        <div class="brand-text">
          <h1>JAR<span>VIS</span></h1>
          <small id="clock">—</small>
        </div>
      </div>
      <div class="topbar-right">
        <span class="sys-mini">STARK INDUSTRIES</span>
      </div>
    </header>

    <!-- SUB-HEADER / STATUS -->
    <div class="statusbar">
      <span id="dateLabel" class="date-label">—</span>
      <span class="dot">•</span>
      <span id="updatedLabel" class="updated-label">Última actualización: —</span>
      <span class="live-pill"><i></i> EN VIVO</span>
    </div>

    <!-- MAIN VIEW (rellenado por JS segun la ruta) -->
    <main id="view" class="view"></main>

    <footer class="footer">
      <span>JARVIS — asistente inteligente de noticias</span>
      <span class="footer-sources" id="footerSources"></span>
    </footer>

    <!-- ====================== DOCK CIRCULAR (HUD) ====================== -->
    <nav class="dock" id="dock" aria-label="Navegación">
      <button class="dock-btn" data-route="#/chat" data-tip="JARVIS">
        <svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="1.5"/><circle cx="24" cy="24" r="13" stroke="currentColor" stroke-width="1.2" opacity=".7"/><circle cx="24" cy="24" r="5.5" fill="currentColor"/><g stroke="currentColor" stroke-width="1.4"><path d="M24 4v6M24 38v6M4 24h6M38 24h6M9.8 9.8l4.3 4.3M33.9 33.9l4.3 4.3M38.2 9.8l-4.3 4.3M14.1 33.9l-4.3 4.3"/></g></svg>
        <span class="dock-label">JARVIS</span>
      </button>
      <button class="dock-btn" data-route="#/home" data-tip="Inicio">
        <svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="1.5"/><circle cx="24" cy="24" r="3.5" fill="currentColor"/><g stroke="currentColor" stroke-width="1.6"><path d="M24 7v9M24 32v9M7 24h9M32 24h9"/></g><circle cx="24" cy="24" r="10.5" stroke="currentColor" stroke-width="1" opacity=".5"/></svg>
        <span class="dock-label">Inicio</span>
      </button>
      <button class="dock-btn" data-route="#/all" data-tip="Noticias">
        <svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="1.5"/><g stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M16 18h16M16 24h16M16 30h10"/></g></svg>
        <span class="dock-label">Noticias</span>
      </button>
      <button class="dock-btn" data-route="#/favorites" data-tip="Favoritos">
        <svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="1.5"/><path d="M24 32s-8-5.2-8-11a4.6 4.6 0 0 1 8-3 4.6 4.6 0 0 1 8 3c0 5.8-8 11-8 11Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
        <span class="dock-label">Favoritos</span>
      </button>
      <button class="dock-btn" data-route="#/archive" data-tip="Historial">
        <svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="1.5"/><circle cx="24" cy="24" r="12" stroke="currentColor" stroke-width="1.3"/><path d="M24 17v7l5 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="dock-label">Historial</span>
      </button>
      <button class="dock-btn" data-route="#/settings" data-tip="Ajustes">
        <svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="1.5"/><circle cx="24" cy="24" r="5" stroke="currentColor" stroke-width="1.8"/><g stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M24 11v5M24 32v5M11 24h5M32 24h5M15 15l3.5 3.5M29.5 29.5 33 33M33 15l-3.5 3.5M18.5 29.5 15 33"/></g></svg>
        <span class="dock-label">Ajustes</span>
      </button>
      <button class="dock-btn" id="refreshBtn" data-tip="Refrescar">
        <svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="1.5"/><path d="M33 19a11 11 0 1 0 1.8 9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M33 12v7h-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="dock-label">Refrescar</span>
      </button>
    </nav>
  </div>

  <!-- Toast / notificaciones -->
  <div id="toast" class="toast"></div>

  <script src="/js/store.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/voice.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
